name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Tauri desktop builds ──────────────────────────────────────────────────
  tauri:
    timeout-minutes: 60
    name: Tauri (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            os-label: linux
            arch: x64
          - platform: windows-latest
            os-label: windows
            arch: x64
          - platform: macos-latest
            os-label: macos
            arch: universal

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.platform }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-latest'
        uses: ./.github/actions/install-tauri-linux-deps

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Tauri app (Linux/Windows)
        if: matrix.platform != 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Stegcore ${{ github.ref_name }}
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false

      - name: Build Tauri app (macOS universal)
        if: matrix.platform == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Stegcore ${{ github.ref_name }}
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

  # ── Docker multi-arch image ───────────────────────────────────────────────
  docker:
    timeout-minutes: 30
    name: Docker (amd64 + arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Checksums ─────────────────────────────────────────────────────────────
  checksums:
    name: Generate checksums
    needs: tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --dir ./assets

      - name: Generate SHA-256 checksums
        run: |
          cd assets
          sha256sum * > stegcore-${{ github.ref_name }}-checksums.sha256
          cat stegcore-${{ github.ref_name }}-checksums.sha256

      - name: Upload checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            ./assets/stegcore-${{ github.ref_name }}-checksums.sha256 \
            --repo ${{ github.repository }} \
            --clobber

  # ── SBOM (Software Bill of Materials) ─────────────────────────────────────
  # CycloneDX SBOMs for the Rust workspace and the frontend, attached to
  # the GitHub release. Supports NIST SSDF + EU CRA supply-chain visibility
  # without committing artefacts to the repo.
  sbom:
    name: SBOM (CycloneDX)
    needs: tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install CycloneDX tooling
        run: |
          cargo install cargo-cyclonedx --locked --version 0.5.7
          npm install -g @cyclonedx/cyclonedx-npm@^2

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate Rust workspace SBOM
        run: |
          cargo cyclonedx --format json --override-filename stegcore-${{ github.ref_name }}-rust
          mkdir -p sbom
          # cargo-cyclonedx emits per-crate files at the workspace root.
          # Aggregate them under sbom/ for upload.
          find . -maxdepth 4 -name 'stegcore-${{ github.ref_name }}-rust*.cdx.json' \
            -not -path './target/*' \
            -exec mv {} sbom/ \;

      - name: Generate frontend SBOM
        working-directory: frontend
        run: |
          cyclonedx-npm --output-format JSON \
            --output-file ../sbom/stegcore-${{ github.ref_name }}-frontend.cdx.json

      - name: Upload SBOMs to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            sbom/*.cdx.json \
            --repo ${{ github.repository }} \
            --clobber
