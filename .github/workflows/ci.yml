name: CI

on:
  push:
    branches: [main, dev]
    # Skip the full matrix on documentation-only or roadmap commits.
    # Markdown changes never touch compiled code; private/ is
    # gitignored and never reaches GitHub anyway but is included as
    # defence in depth. The Licence Header workflow still runs on
    # these paths to catch missing licence blocks on docs.
    paths-ignore:
      - '**.md'
      - 'private/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'private/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ matrix.os }}

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            imagemagick \
            python3-pil

      # Track E lossy-pipeline tests shell out to Pillow on Linux + macOS.
      # On Windows the tests skip gracefully (no `which` semantics there
      # and ImageMagick `convert` collides with the built-in NTFS tool);
      # install only where the tests run.
      - name: Install Pillow + ImageMagick (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install imagemagick
          python3 -m pip install --break-system-packages Pillow

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Format check
        run: cargo fmt --all --check

      - name: Check workspace
        run: cargo check --workspace

      - name: Run tests
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  # Install-script smoke: verify install.sh on Linux + macOS and
  # install.ps1 on Windows actually parses and runs through its dry
  # paths. This is the answer to "does the universal install really
  # work everywhere" — by running on the three runners every CI
  # cycle, drift in either script surfaces immediately.
  install-smoke:
    name: Install smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Bash install --help (Linux + macOS)
        if: matrix.os != 'windows-latest'
        run: |
          bash install.sh --help
          # Syntax-check both branches.
          bash -n install.sh
          echo "✓ install.sh parses and --help runs"

      - name: Bash install in Git Bash (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # Confirm install.sh also runs cleanly under Git Bash on Windows
          # (this is the WSL / MSYS2 / Cygwin path).
          bash install.sh --help
          bash -n install.sh
          echo "✓ install.sh parses + --help runs under Git Bash"

      - name: PowerShell install.ps1 (Windows native)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Syntax check + Get-Help. A real install would call
          # GitHub Releases; we only verify the script itself.
          $errors = $null
          [System.Management.Automation.PSParser]::Tokenize(
            (Get-Content -Raw install.ps1), [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            Write-Error "install.ps1 has syntax errors: $errors"
            exit 1
          }
          Write-Output "✓ install.ps1 parses"
          Get-Help .\install.ps1 | Select-Object -First 30

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Audit RustSec advisories
        run: cargo audit

      # cargo-deny adds licence + source-policy enforcement on top of
      # cargo-audit's CVE checks. Configured by deny.toml at the repo
      # root. Both gates must pass for the audit job to be green.
      - name: Install cargo-deny (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Run cargo-deny (licences, bans, sources)
        run: cargo deny --workspace --all-features check licenses bans sources

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  # Track D — GUI chaos. Playwright drives the Vite dev server (no
  # Tauri runtime) on Linux; cheap and covers the React state machine
  # + wizard back-button discipline + route transitions. The Tauri-
  # bound smoke job below covers the IPC boundary on the actual built
  # binary; together they cover the surface the user touches.
  gui-e2e-vite:
    name: GUI E2E (Vite + Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright suite
        working-directory: frontend
        run: npm run e2e

  # Track D (cont.) — Tauri runtime smoke. tauri-driver + WebdriverIO 8
  # against the actual built binary. Linux-only; macOS lacks the driver
  # and Windows requires extra display-server scaffolding. WDIO is
  # pinned to v8 because v9 hits an open upstream bug
  # (tauri-driver 2.0.6 does not strip BiDi capabilities).
  #
  # `continue-on-error` so a Tauri-driver hiccup never blocks the gate
  # — Playwright/Vite remains the required surface for v4.0.1. When
  # upstream stabilises, promote this to required.
  # Tauri runtime smoke against the actual built binary. Runs on every
  # push to dev or main so anything that fails on main has already
  # failed on dev — no tag-day surprises. The job is `continue-on-
  # error: true` so it surfaces signal without blocking the gate
  # while tauri-driver upstream stabilises. Docs-only commits skip
  # the entire CI workflow via the top-level paths-ignore filter, so
  # this stays cheap when no code changes.
  gui-e2e-tauri:
    name: GUI E2E (Tauri runtime — non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: tauri-e2e
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config \
            webkit2gtk-driver xvfb
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Node deps + tauri-driver
        working-directory: frontend
        run: |
          npm ci
          cargo install tauri-driver --locked
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Build Tauri binary (debug)
        run: cargo build --bin stegcore-gui
      - name: Run WDIO smoke under xvfb
        working-directory: frontend
        run: |
          # Start tauri-driver in the background; WDIO connects on 4444.
          tauri-driver --port 4444 &
          DRIVER_PID=$!
          sleep 3
          # Headless display so WebKitGTK has somewhere to render.
          xvfb-run --auto-servernum --server-args='-screen 0 1280x800x24' \
            npm run e2e:tauri
          kill $DRIVER_PID 2>/dev/null || true
