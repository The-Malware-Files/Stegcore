name: Coverage

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'private/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'private/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Line coverage (≥90%)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install Linux system deps
        uses: ./.github/actions/install-tauri-linux-deps

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: coverage-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # Two passes: first emits the codecov-format file the upload
      # action needs; second enforces the local 90% gate. Both reuse
      # the same compiled artefacts via cargo-llvm-cov's incremental
      # mode, so the runtime cost is one workspace test pass.
      - name: Run tests with coverage (codecov report)
        run: cargo llvm-cov --workspace --codecov --output-path codecov.json

      - name: Enforce ≥90% line coverage
        run: cargo llvm-cov report --fail-under-lines 90

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: codecov.json
          fail_ci_if_error: false
          # Tokenless upload for public repos. Add CODECOV_TOKEN
          # to repo secrets if the repo is private or uploads start
          # being rate-limited.
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
