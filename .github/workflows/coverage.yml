name: Coverage

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'private/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'private/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Workspace coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install Linux system deps
        uses: ./.github/actions/install-tauri-linux-deps

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: coverage-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # Single workspace test pass produces the raw profile data; the
      # report invocations below filter that same data with the
      # documented exclusion list. No re-compile, no re-test between
      # the upload step and the gate.
      #
      # Exclusions (CLAUDE.md A7, "exclusion register"):
      #   - stegcore-tauri: framework glue. Needs a real Tauri runtime
      #     to drive #[command] handlers; tracked as v4.1 IPC harness.
      #   - frontend: separate JS toolchain. No Vitest harness yet;
      #     tracked as v4.1 T-23.
      #   - cli/src/commands/wizard.rs: interactive run_embed and
      #     run_extract bodies read from a real TTY via rpassword + rfd
      #     and exit() out of every step. Cannot be reached from a
      #     headless cargo test. Pure helpers (cipher_choice_to_id,
      #     cover_label, default_output_path) are tested inline. The
      #     interactive surface gets the v4.1 pty harness.
      - name: Run workspace tests with coverage
        run: cargo llvm-cov --workspace --exclude stegcore-tauri --no-report

      # Codecov upload first, before the gate, so the badge / dashboard
      # always reflects the latest measurement even when the gate fails.
      # Emits the codecov-format file from the same profile data.
      - name: Emit codecov.json
        run: |
          cargo llvm-cov report --codecov \
            --ignore-filename-regex 'cli/src/commands/wizard\.rs' \
            --output-path codecov.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: codecov.json
          fail_ci_if_error: false
          # Tokenless upload for public repos via the Codecov GitHub
          # App. Add CODECOV_TOKEN as a repo secret if the App is not
          # installed at the org level or if uploads start being
          # rate-limited.
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # Single workspace gate at 90% lines. The exclusion list is in
      # the upload step's regex above; this step uses the same list.
      # Any release that lowers this number needs a documented
      # exception in the release-gate review notes (CLAUDE.md A7).
      - name: 'Gate: workspace >=90% lines (excluding documented surfaces)'
        if: always()
        run: |
          cargo llvm-cov report \
            --ignore-filename-regex 'cli/src/commands/wizard\.rs' \
            --fail-under-lines 90
