name: Coverage

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'private/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'private/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Per-crate coverage gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install Linux system deps
        uses: ./.github/actions/install-tauri-linux-deps

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: coverage-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # Single workspace test pass produces the raw profile data; the
      # subsequent report invocations filter that same data per crate.
      # No re-compile, no re-test between gate steps.
      - name: Run workspace tests with coverage
        run: cargo llvm-cov --workspace --no-report

      # Codecov upload first, before any gate, so the badge / dashboard
      # always reflects the latest measurement even when a gate fails.
      # Emits the codecov-format file from the same profile data.
      - name: Emit codecov.json
        run: cargo llvm-cov report --codecov --output-path codecov.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: codecov.json
          fail_ci_if_error: false
          # Tokenless upload for public repos via the Codecov GitHub
          # App. Add CODECOV_TOKEN as a repo secret if the App is not
          # installed at the org level or if uploads start being
          # rate-limited.
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # Per-crate gates (CLAUDE.md A6, post-v4.0.1 release-gate review).
      # Holds the load-bearing crates to a high bar without lying about
      # the UI shell. Each gate runs unconditionally and any failure
      # fails the job; ordering does not matter for correctness.
      #
      # v4.1 sprint scope (per the active-sprint plan): push every
      # surface to >=90% line coverage workspace-wide. The frontend
      # gets its own Vitest harness (T-23); the Tauri shell gets a
      # proper IPC test harness; CLI gets exhaustive flag-combo tests.
      #
      # Skipped from coverage today:
      #   - stegcore-tauri: framework glue, needs full Tauri runtime
      #     in tests to exercise (deferred to v4.1).
      #   - frontend: separate JS toolchain, no Vitest harness yet.
      - name: 'Gate: stegcore-engine >=90% lines'
        if: always()
        run: cargo llvm-cov report --package stegcore-engine --fail-under-lines 90

      - name: 'Gate: stegcore-core >=85% lines'
        if: always()
        run: cargo llvm-cov report --package stegcore-core --fail-under-lines 85

      - name: 'Gate: stegcore-cli >=70% lines'
        if: always()
        run: cargo llvm-cov report --package stegcore-cli --fail-under-lines 70
