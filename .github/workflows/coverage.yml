name: Coverage

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'private/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'private/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Workspace coverage gate
    runs-on: ubuntu-latest
    # llvm-cov instruments and recompiles the workspace, so a cold run needs
    # more than 30 min on the 2-core runner; the old cap killed it before the
    # Cargo cache could save. Warm runs finish well under this.
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install Linux system deps
        uses: ./.github/actions/install-tauri-linux-deps

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: coverage-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # Single workspace test pass produces the raw profile data; the
      # report invocations below filter that same data with the
      # documented exclusion list. No re-compile, no re-test between
      # the upload step and the gate.
      #
      # Exclusions (CLAUDE.md A7, "exclusion register"):
      #   - src-tauri/src/runtime.rs + main.rs: Tauri runtime glue. The
      #     #[command] wrappers + run() need a live Tauri runtime to
      #     reach. The path-explicit impls behind them live in
      #     src-tauri/src/lib.rs and ARE unit-tested (tests/commands.rs),
      #     so the crate is no longer excluded wholesale; only these two
      #     glue files are ignored.
      #   - frontend: separate JS toolchain. No Vitest harness yet;
      #     tracked as v4.1 T-23.
      #
      # cli/src/commands/wizard.rs is no longer excluded: the interactive
      # run_embed / run_extract bodies are now driven through a real
      # pseudo-terminal by tests/wizard_pty.rs (rexpect), and cargo-llvm-cov
      # captures the spawned binary's coverage. The file sits at ~84% and
      # counts toward the workspace number.
      - name: Run workspace tests with coverage
        run: cargo llvm-cov --workspace --no-report

      # Codecov upload first, before the gate, so the badge / dashboard
      # always reflects the latest measurement even when the gate fails.
      # Emits the codecov-format file from the same profile data.
      - name: Emit codecov.json
        run: |
          cargo llvm-cov report --codecov \
            --ignore-filename-regex '(src-tauri/src/runtime|src-tauri/src/main)\.rs' \
            --output-path codecov.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        if: always()
        with:
          files: codecov.json
          fail_ci_if_error: false
          # Tokenless upload for public repos via the Codecov GitHub
          # App. Add CODECOV_TOKEN as a repo secret if the App is not
          # installed at the org level or if uploads start being
          # rate-limited.
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # Single workspace gate at 91% lines. Raised from 90 in v4.1 as the
      # Tauri-impl-split, CLI pty harness and coverage-fill work landed the
      # number at ~91.3%; the 92 target is a pre-4.1.0-tag coverage task on
      # the weakest files (analyse.rs, analysis.rs error branches). The only
      # ignored surfaces are the Tauri runtime-glue files (regex above);
      # the frontend has its own Vitest gate in ci.yml. Any release that
      # lowers this number needs a documented exception (CLAUDE.md A7).
      - name: 'Gate: workspace >=91% lines (Tauri runtime glue excepted)'
        if: always()
        run: |
          cargo llvm-cov report \
            --ignore-filename-regex '(src-tauri/src/runtime|src-tauri/src/main)\.rs' \
            --fail-under-lines 91
